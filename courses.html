<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Courses Duo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBEG9mOSns3-Gw1vAEnZILaIRKrVnweHdo",
            authDomain: "misfit-game.firebaseapp.com",
            projectId: "misfit-game",
            storageBucket: "misfit-game.firebasestorage.app",
            messagingSenderId: "394080113498",
            appId: "1:394080113498:web:18e40d37027d00f67ed963"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "courses");

        // --- FONCTIONS LOGIQUES ---

        // Ajouter un article
        window.addItem = async () => {
            const input = document.getElementById('itemInput');
            const text = input.value.trim();
            if (text) {
                await addDoc(colRef, {
                    name: text,
                    checked: false,
                    createdAt: serverTimestamp()
                });
                input.value = '';
            }
        };

        // Cocher / Décocher
        window.toggleItem = async (id, status) => {
            const docRef = doc(db, "courses", id);
            await updateDoc(docRef, { checked: !status });
        };

        // Supprimer
        window.deleteItem = async (id) => {
            if(confirm("Supprimer cet article ?")) {
                await deleteDoc(doc(db, "courses", id));
            }
        };

        // --- TEMPS RÉEL (SYNC) ---
        const q = query(colRef, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const listItems = document.getElementById('listItems');
            listItems.innerHTML = '';

            snapshot.forEach((doc) => {
                const item = doc.data();
                const id = doc.id;

                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border transition-all ${item.checked ? 'opacity-50 scale-95' : 'border-indigo-50'}`;

                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleItem('${id}', ${item.checked})">
                        <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center ${item.checked ? 'bg-green-500 border-green-500' : 'border-gray-300'}">
                            ${item.checked ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <span class="text-lg font-medium ${item.checked ? 'line-through text-gray-400' : 'text-gray-800'}">${item.name}</span>
                    </div>
                    <button onclick="deleteItem('${id}')" class="p-2 text-gray-300 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                listItems.appendChild(li);
            });
        });
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

<div class="max-w-md mx-auto px-4 py-8">
    <header class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-indigo-600">Panier</h1>
            <p class="text-slate-400 font-medium">Synchronisé avec ma femme ❤️</p>
        </div>
        <div class="bg-indigo-100 text-indigo-600 p-2 rounded-xl">🛒</div>
    </header>

    <div class="sticky top-4 z-10 mb-8">
        <div class="flex gap-2 p-2 bg-white rounded-2xl shadow-xl shadow-indigo-100/50 border border-indigo-50">
            <input type="text" id="itemInput" placeholder="Ajouter à la liste..."
                   class="w-full pl-4 pr-2 py-3 outline-none text-lg bg-transparent"
                   onkeypress="if(event.key === 'Enter') addItem()">
            <button onclick="addItem()" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
    </div>

    <ul id="listItems" class="space-y-4 mb-20">
    </ul>
</div>

</body>
</html>
